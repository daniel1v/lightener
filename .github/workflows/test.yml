name: "Tests"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  pytest:
    name: "Pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
          cache: "pip"

      - name: "Install dependencies"
        run: pip install -r requirements.txt

      - name: "Run tests"
        run: pytest tests/ -v
