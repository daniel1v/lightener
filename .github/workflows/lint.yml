name: "Lint"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Install ruff"
        run: pip install ruff==0.15.18

      - name: "Check"
        run: ruff check .
