name: "Release"

on:
  release:
    types: ["published"]

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Update version in manifest.json"
        run: |
          yq -i -o json '.version="${{ github.event.release.tag_name }}"' \
            custom_components/lightener/manifest.json

      - name: "Create ZIP"
        run: |
          cd custom_components/lightener
          zip lightener.zip -r ./

      - name: "Upload ZIP to release"
        uses: "softprops/action-gh-release@v2"
        with:
          files: custom_components/lightener/lightener.zip
